<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부산 로컬 관광지도 - 맛집, 카페, 핫플레이스</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- Custom Style CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Interactive Map Element -->
        <div id="map"></div>

        <!-- Float UI Controls Overlay -->
        <div class="ui-overlay">
            
            <!-- App Header Panel -->
            <header class="app-header interactive">
                <div class="brand">
                    <i class="fa-solid fa-anchor brand-icon"></i>
                    <div>
                        <h1>부산 로컬 맵</h1>
                        <span>Busan Spot Map</span>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="theme-toggle-btn" class="btn-icon" title="테마 변경">
                        <i class="fa-solid fa-sun"></i>
                    </button>
                </div>
            </header>

            <!-- Top Filter Buttons Panel -->
            <div class="topbar">
                <div class="filters-wrapper interactive">
                    <button class="filter-btn active" data-category="all">
                        <i class="fa-solid fa-globe"></i>전체
                    </button>
                    <button class="filter-btn" data-category="hotspot">
                        <i class="fa-solid fa-camera" style="color: var(--color-hotspot)"></i>핫플레이스
                    </button>
                    <button class="filter-btn" data-category="cafe">
                        <i class="fa-solid fa-coffee" style="color: var(--color-cafe)"></i>카페
                    </button>
                    <button class="filter-btn" data-category="korean">
                        <i class="fa-solid fa-utensils" style="color: var(--color-korean)"></i>한식
                    </button>
                    <button class="filter-btn" data-category="chinese">
                        <i class="fa-solid fa-bowl-food" style="color: var(--color-chinese)"></i>중식
                    </button>
                    <button class="filter-btn" data-category="western">
                        <i class="fa-solid fa-circle-chevron-right" style="color: var(--color-western)"></i>양식
                    </button>
                    <button class="filter-btn" data-category="others">
                        <i class="fa-solid fa-star" style="color: var(--color-others)"></i>그 외
                    </button>
                </div>

                <div class="search-widget interactive">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="search-input" placeholder="이름, 주소, 태그 검색...">
                </div>
            </div>

            <!-- Left Interactive Sidebar -->
            <aside class="sidebar interactive">
                
                <!-- Weather info banner -->
                <div id="weather-widget-container" style="padding: 1.25rem 1.25rem 0 1.25rem;"></div>

                <!-- Navigation Tabs -->
                <div class="sidebar-tabs">
                    <button class="tab-btn active" data-tab="spots">
                        <i class="fa-solid fa-list"></i>관광지 목록
                    </button>
                    <button class="tab-btn" data-tab="courses">
                        <i class="fa-solid fa-route"></i>추천 코스
                    </button>
                    <button class="tab-btn" data-tab="bookmarks">
                        <i class="fa-solid fa-heart"></i>나만의 저장
                    </button>
                </div>

                <!-- Tab 1: Spot Card list -->
                <div id="tab-spots" class="tab-content active">
                    <div id="spots-list">
                        <!-- Filled dynamically by JavaScript -->
                    </div>
                </div>

                <!-- Tab 2: Travel Courses list -->
                <div id="tab-courses" class="tab-content">
                    <div id="courses-list" class="course-list">
                        <!-- Filled dynamically by JavaScript -->
                    </div>
                </div>

                <!-- Tab 3: Favorite Bookmarks list -->
                <div id="tab-bookmarks" class="tab-content">
                    <div id="bookmarks-list">
                        <!-- Filled dynamically by JavaScript -->
                    </div>
                </div>

            </aside>

            <!-- Detailed Sliding Information Card Pane -->
            <div id="detail-panel" class="detail-panel">
                <div class="detail-header">
                    <img id="detail-image" class="detail-img" src="" alt="">
                    <button id="detail-close-btn" class="detail-close" title="닫기">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                    <div class="detail-header-overlay">
                        <div class="detail-title-wrap">
                            <span id="detail-category" class="card-category">카테고리</span>
                            <h2 id="detail-title" style="margin-top: 0.5rem">관광지명</h2>
                        </div>
                    </div>
                </div>

                <div class="detail-body">
                    <div class="detail-info-row" id="detail-address">
                        <i class="fa-solid fa-location-dot"></i>
                        <div class="detail-info-content">
                            <h4>위치</h4>
                            <p>주소</p>
                        </div>
                    </div>

                    <div class="detail-info-row" id="detail-phone">
                        <i class="fa-solid fa-phone"></i>
                        <div class="detail-info-content">
                            <h4>전화번호</h4>
                            <p>전화번호</p>
                        </div>
                    </div>

                    <div class="detail-info-row" id="detail-hours">
                        <i class="fa-solid fa-clock"></i>
                        <div class="detail-info-content">
                            <h4>영업시간</h4>
                            <p>영업시간</p>
                        </div>
                    </div>

                    <div class="detail-info-row" id="detail-menu">
                        <i class="fa-solid fa-utensils"></i>
                        <div class="detail-info-content">
                            <h4>시그니처 / 가격</h4>
                            <p>대표 메뉴</p>
                        </div>
                    </div>

                    <p id="detail-description" class="detail-desc">설명</p>

                    <!-- Interactive Actions -->
                    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                        <h4 style="font-size: 0.85rem; font-weight: 700; color: var(--text-primary);">길찾기 & 지도 연동</h4>
                        <div class="action-links">
                            <a id="link-naver" target="_blank" class="btn-route naver">
                                <i class="fa-solid fa-location-arrow" style="font-size: 1rem"></i> 네이버 지도
                            </a>
                            <a id="link-kakao" target="_blank" class="btn-route kakao">
                                <i class="fa-solid fa-map-pin" style="font-size: 1rem"></i> 카카오 맵
                            </a>
                            <a id="link-google" target="_blank" class="btn-route google">
                                <i class="fa-solid fa-compass" style="font-size: 1rem"></i> 구글 지도
                            </a>
                        </div>
                    </div>

                    <div style="margin-top: auto; padding-top: 1rem;">
                        <button id="detail-bookmark" class="btn-icon interactive" style="width:100%; height:46px; border-radius:12px; gap:0.5rem; display:flex;" title="나의 저장목록에 추가">
                            <i class="fa-regular fa-heart"></i>
                            <span style="font-weight: 600; font-size: 0.9rem">이 관광지 찜하기</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- GPS User Locate Button -->
            <button id="gps-btn" class="gps-btn interactive" title="내 위치 찾기">
                <i class="fa-solid fa-location-crosshairs" style="font-size: 1.25rem"></i>
            </button>

        </div>
    </div>

    <!-- Leaflet Map JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Custom Application Logic JS -->
    <script src="app.js"></script>
</body>
</html>
